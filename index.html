<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Save My Louisiana | Empower, Educate, Inform</title>
  <meta name="description" content="Protecting our land, water, and constitutional rights." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Open+Sans:wght@400;600;700;800&family=Merriweather:ital,wght@0,300;0,700;1,300&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Open Sans', 'sans-serif'],
            heading: ['Inter', 'sans-serif'], // Changed to Inter for a cleaner, professional look
            serif: ['Merriweather', 'serif'],
          },
          colors: {
            brand: {
              red: '#D32F2F', // Deep red
              blue: '#1976D2', // Professional blue
              dark: '#1a1a1a',
              light: '#f5f5f5',
            }
          },
          animation: {
            'spin-slow': 'spin 3s linear infinite',
            'zoom-slow': 'zoom 20s ease-in-out infinite alternate',
            'globe-rotate': 'globeRotate 30s linear infinite', // Slower rotation
            'pulse-border': 'pulseBorder 2s infinite',
            'ring-pulse': 'ringPulse 3s ease-in-out infinite',
            'fade-in-up': 'fadeInUp 1s ease-out forwards',
            'shutter-open': 'shutterOpen 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards', // Smoother cinematic open
          },
          keyframes: {
            zoom: {
              '0%': { transform: 'scale(1)' },
              '100%': { transform: 'scale(1.15)' },
            },
            globeRotate: {
              '0%': { backgroundPosition: '0% 50%' },
              '100%': { backgroundPosition: '200% 50%' }
            },
            pulseBorder: {
              '0%': { boxShadow: '0 0 0 0 rgba(25, 118, 210, 0.7)' },
              '70%': { boxShadow: '0 0 0 10px rgba(25, 118, 210, 0)' },
              '100%': { boxShadow: '0 0 0 0 rgba(25, 118, 210, 0)' }
            },
            ringPulse: {
              '0%': { transform: 'scale(1)', opacity: '0.1', borderColor: 'rgba(25, 118, 210, 0.1)' },
              '50%': { transform: 'scale(1.05)', opacity: '0.3', borderColor: 'rgba(25, 118, 210, 0.3)' },
              '100%': { transform: 'scale(1)', opacity: '0.1', borderColor: 'rgba(25, 118, 210, 0.1)' },
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            shutterOpen: {
              '0%': {
                clipPath: 'inset(0 48% 0 48% round 1rem)',
                transform: 'scale(0.95)',
                opacity: '0.5'
              },
              '100%': {
                clipPath: 'inset(0 0 0 0 round 2.5rem)',
                transform: 'scale(1)',
                opacity: '1'
              }
            }
          }
        }
      }
    }
  </script>
  <style>
    html {
      scroll-behavior: smooth;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
